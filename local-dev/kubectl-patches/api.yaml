---
metadata:
  annotations:
    kubernetes.io/change-cause: "Add local-dev volume mounts"
spec:
  template:
    spec:
      securityContext:
        runAsUser: 1000
      containers:
      - name: api
        command:
          - sh
          - -c
          - './node_modules/.bin/tsc-watch --incremental --onSuccess "node -r dotenv-extended/config dist/index"'
        volumeMounts:
        - mountPath: "/app/src"
          name: api-src
        - mountPath: "/app/dist"
          name: api-dist
      volumes:
      - name: api-src
        hostPath:
          path: "/lagoon/services/api/src"
          type: Directory
      - name: api-dist
        hostPath:
          path: "/lagoon/services/api/dist"
          type: Directory
