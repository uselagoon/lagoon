
- name: "{{ testname }} - init git, add files, commit, git push"
  hosts: localhost
  serial: 1
  vars:
    git_files: "{{ branch }}/"
  tasks:
  - ansible.builtin.include_tasks: ../../tasks/git-init.yaml
  - ansible.builtin.include_tasks: ../../tasks/git-add-commit-push.yaml

- name: "{{ testname }} - api deployEnvironmentBranch on {{ project }}, which should deploy the first commit"
  hosts: localhost
  serial: 1
  vars:
    branch: "{{ branch }}"
    project: "{{ project }}"
    namespace: "{{ project | regex_replace('_', '-') }}-{{ branch | regex_replace('/', '-') }}"
  tasks:
  - ansible.builtin.include_tasks: ../../tasks/api/deploy-no-sha.yaml

- name: "{{ testname }} - check if {{ project }} is deployed with searching for 'Hello World!' on autogenerated route"
  hosts: localhost
  serial: 1
  vars:
    url: "http://server.{{ project | regex_replace('_', '-') }}.{{ branch | regex_replace('/', '-') }}.{{ route_suffix }}"
    expected_content: "Hello World!"
  tasks:
  - ansible.builtin.include_tasks: ../../checks/check-url-content.yaml

- name: "{{ testname }} - setup {{ project }} with seed data"
  hosts: localhost
  serial: 1
  vars:
    url: "http://server.{{ project | regex_replace('_', '-') }}.{{ branch | regex_replace('/', '-') }}.{{ route_suffix }}/seed"
    expected_content: "done"
  tasks:
  - ansible.builtin.include_tasks: ../../checks/check-url-content.yaml

- name: "{{ testname }} - api clone project {{ project }} environment {{ branch }}"
  hosts: localhost
  serial: 1
  vars:
    project: "{{ project }}"
    branch: "{{ branch }}"
    destProject: "{{ destProject }}"
  tasks:
  - ansible.builtin.include_tasks: ../../tasks/api/clone-project.yaml

- name: "{{ testname }} - check if {{ destProject }} is deployed with searching for 'Hello World!'"
  hosts: localhost
  serial: 1
  vars:
    url: "http://server.{{ destProject | regex_replace('_', '-') }}.{{ branch | regex_replace('/', '-') }}.{{ route_suffix }}"
    expected_content: "Hello World!"
  tasks:
  - ansible.builtin.include_tasks: ../../checks/check-url-content.yaml

