---
- ansible.builtin.import_playbook: features/api-token.yaml
  vars:
    testname: "API TOKEN"

- ansible.builtin.import_playbook: api/add-org-project.yaml
  vars:
    testname: "PROJECTCLONE {{ cluster_type|upper }}"
    project: ci-project-clone-{{ cluster_type }}
    git_repo_name: project-clone.git
    git_url: "{{ localgit_url }}/{{ git_repo_name }}"
    git_http_url: "{{ localgit_http_url }}/{{ git_repo_name }}"

- ansible.builtin.import_playbook: project-clone/project-clone.yaml
  vars:
    testname: "PROJECTCLONE {{ cluster_type|upper }}"
    git_repo_name: project-clone.git
    project: ci-project-clone-{{ cluster_type }}
    destProject: ci-project-clone-copy-{{ cluster_type }}
    branch: project-clone

- ansible.builtin.import_playbook: api/delete-project.yaml
  vars:
    testname: "PROJECTCLONE {{ cluster_type|upper }}"
    project: ci-project-clone-{{ cluster_type }}

- ansible.builtin.import_playbook: api/delete-project.yaml
  vars:
    testname: "PROJECTCLONE {{ cluster_type|upper }}"
    project: ci-project-clone-copy-{{ cluster_type }}