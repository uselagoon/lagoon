  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: [check-skip]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform_safe: linux-amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            platform_safe: linux-arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          name: lagoon

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and populate cache
        env:
          LAGOON_VERSION: pr-${{ github.event.pull_request.number }}
          CACHE_TAG: ghcr.io/${{ github.repository }}:buildcache-pr${{ github.event.pull_request.number }}
          CACHE_TAG_PUSH: ghcr.io/${{ github.repository }}:buildcache-pr${{ github.event.pull_request.number }}
        run: |
          make -j$(getconf _NPROCESSORS_ONLN) -O build PLATFORM_ARCH=${{ matrix.platform }} \
            LAGOON_VERSION=pr-${{ github.event.pull_request.number }} \
            DOCKER_BUILD_CACHE='--set "*.output=type=cacheonly"'

  publish-uselagoon:
    name: Publish to uselagoon (ghcr.io)
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          name: lagoon
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 8

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish multi-arch to ghcr.io/uselagoon
        env:
          LAGOON_VERSION: pr-${{ github.event.pull_request.number }}
          CACHE_TAG: ghcr.io/${{ github.repository }}:buildcache-pr${{ github.event.pull_request.number }}
        run: |
          make publish-uselagoon-images-pr \
            CI_BUILD_TAG=lagoon \
            PUBLISH_PLATFORM_ARCH=linux/amd64,linux/arm64 \
            LAGOON_VERSION=pr-${{ github.event.pull_request.number }} \
            CI_IMAGE_REPO=ghcr.io/${{ github.repository }}

  cleanup-cache:
    name: Cleanup GHCR
    needs: [build, publish-uselagoon]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      packages: write
    strategy:
      matrix:
        package:
          - lagoon/api
          - lagoon/api-db
          - lagoon/api-redis
          - lagoon/actions-handler
          - lagoon/auth-server
          - lagoon/backup-handler
          - lagoon/broker
          - lagoon/api-sidecar-handler
          - lagoon/keycloak-db
          - lagoon/keycloak
          - lagoon/local-api-data-watcher-pusher
          - lagoon/local-git
          - lagoon/logs2notifications
          - lagoon/ssh
          - lagoon/task-activestandby
          - lagoon/task-projectclone
          - lagoon/tests
          - lagoon/webhook-handler
          - lagoon #for buildcache tags
    steps:
      - name: Cleanup untagged and unreferenced versions for ${{ matrix.package }}
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          package: ${{ matrix.package }}
          delete-untagged: true
          delete-partial-images: false  # keeps per-arch digests referenced by a multi-arch manifest