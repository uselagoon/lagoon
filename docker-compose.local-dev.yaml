version: '3.2'

volumes:
  broker: {}

services:
  api-db-init:
    volumes:
      - ./services/api/database:/app/database
  api-lagoon-migrations:
    volumes:
      - ./services/api/src:/app/src
  api:
    command: ./node_modules/.bin/tsc-watch --incremental --onSuccess "node -r dotenv-extended/config dist/index"
    volumes:
      - ./services/api/database:/app/database
      - ./services/api/src:/app/src
  auth-server:
    command: pnpm run dev
    volumes:
      - ./services/auth-server/src:/app/services/auth-server/src
  keycloak:
    volumes:
      - "./services/keycloak/startup-scripts:/opt/keycloak/startup-scripts"
      - "./services/keycloak/themes/lagoon:/opt/keycloak/themes/lagoon"
      - "./services/keycloak/themes/lagoon-v2:/opt/keycloak/themes/lagoon-v2"
      - "./local-dev/keycloak:/lagoon/keycloak"
  local-api-data-watcher-pusher:
    volumes:
      - ./local-dev/api-data-watcher-pusher:/home
